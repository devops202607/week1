apiVersion: apps/v1
kind: Deployment
metadata:
  name: week1-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: week1-app
  template:
    metadata:
      labels:
        app: week1-app
    spec:
      containers:
      - name: week1-app
        image: derifgjg/week1-app:v1.0.6
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: week1-app
spec:
  selector:
    app: week1-app
  ports:
  - port: 80
    targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: week1-app
spec:
  rules:
  - host: week1.wesdxc.work
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: week1-app
            port:
              number: 80
