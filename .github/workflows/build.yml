name: Build and Push

on:
  push:
    tags:
      - v*

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: derifgig
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push
        run: |
          docker build -t derifgig/week1-app:${{ steps.tag.outputs.tag }} \
            -t derifgig/week1-app:latest .
          docker push derifgig/week1-app:${{ steps.tag.outputs.tag }}
          docker push derifgig/week1-app:latest

      - name: Update deployment.yaml
        run: |
          sed -i "s|image: derifgig/week1-app:.*|image: derifgig/week1-app:${{ steps.tag.outputs.tag }}|" k3s/deployment.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k3s/deployment.yaml
          git commit -m "ci: update image to ${{ steps.tag.outputs.tag }}" || true
          git push
